<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader - No Watermark</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7663137588714102" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 100%);
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .btn-gradient {
            background: linear-gradient(to right, #6366f1, #a855f7);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #result {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nav Drawer Style */
        #side-menu {
            transition: transform 0.3s ease-in-out;
        }
        .menu-open {
            transform: translateX(0) !important;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4 sm:p-8 relative overflow-x-hidden">

    <nav class="w-full max-w-4xl flex justify-end mb-4">
        <button onclick="toggleMenu()" class="p-3 bg-white rounded-xl shadow-sm hover:bg-gray-50 transition-colors z-50">
            <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </nav>

    <div id="menu-overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm z-[60]"></div>
    <div id="side-menu" class="fixed top-0 right-0 h-full w-64 bg-white shadow-2xl z-[70] translate-x-full p-6 flex flex-col">
        <div class="flex justify-between items-center mb-10">
            <span class="font-bold text-lg text-gray-800">Menu</span>
            <button onclick="toggleMenu()" class="text-gray-400 hover:text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <nav class="flex flex-col gap-4">
            <a href="/" class="flex items-center gap-3 p-3 bg-indigo-50 text-indigo-600 rounded-xl font-semibold">
                <span>🏠</span> Home
            </a>
            <a href="/api" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <span>🔌</span> API Documentation
            </a>
            <a href="https://t.me/IkyyExecutive" target="_blank" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <span>💬</span> Contact Admin
            </a>
        </nav>
        
        <div class="mt-auto pt-6 border-t border-gray-100">
            <p class="text-[10px] text-gray-400 text-center uppercase tracking-widest">TikDown v1.0.0</p>
        </div>
    </div>

    <header class="text-center mb-8">
        <div class="inline-block p-3 bg-white rounded-2xl shadow-sm mb-4">
            <span class="text-3xl">🎬</span>
        </div>
        <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text">
            TikTok Downloader
        </h1>
        <p class="text-gray-500 mt-1 font-medium">Cepat, Mudah, & Tanpa Watermark</p>
    </header>

    <main class="w-full max-w-md space-y-4">
        
        <div class="card p-6 border border-white">
            <div class="space-y-4">
                <div class="relative">
                    <input id="url" 
                        type="text"
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-xl px-4 py-4 outline-none focus:border-indigo-400 focus:bg-white transition-all text-gray-700"
                        placeholder="Tempel link video TikTok...">
                </div>

                <button onclick="process()" 
                    class="btn-gradient w-full text-white py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2">
                    🚀 Mulai Download
                </button>
            </div>

            <div id="status" class="text-center mt-4 text-sm font-semibold text-gray-600"></div>
            <div id="loading" class="hidden flex justify-center mt-4">
                <div class="loader"></div>
            </div>
        </div>

        <div id="placeholder-info" class="py-12 text-center opacity-30">
            <div class="text-6xl mb-2">📥</div>
            <p class="text-sm font-medium">Link yang anda masukkan akan diproses di sini</p>
        </div>

        <div id="result" class="hidden card overflow-hidden border-b-4 border-indigo-500">
            <div class="p-5 flex flex-col sm:flex-row gap-5">
                <div class="relative shrink-0 mx-auto">
                    <video id="video" controls 
                        class="w-32 h-52 object-cover rounded-xl bg-black shadow-lg">
                    </video>
                </div>

                <div class="flex-1 flex flex-col">
                    <div class="mb-4 text-center sm:text-left">
                        <h2 id="title" class="font-bold text-gray-800 line-clamp-2 text-sm leading-tight"></h2>
                        <p id="author" class="text-indigo-600 text-xs font-bold mt-1"></p>
                    </div>

                    <div class="grid grid-cols-1 gap-2">
                        <button id="nowm" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white rounded-lg font-bold text-xs transition-colors">
                             DOWNLOAD (NO WM)
                        </button>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="wm" class="py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-bold text-[10px] uppercase tracking-wider">
                                Dengan WM
                            </button>
                            <button id="mp3" class="py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-lg font-bold text-[10px] uppercase tracking-wider">
                                Audio MP3
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 bg-gray-50 rounded-xl overflow-hidden min-h-[100px] flex items-center justify-center border-2 border-dashed border-gray-200">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-7663137588714102"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>

    </main>

    <footer class="mt-auto py-8">
        <p class="text-[10px] text-gray-400 text-center uppercase tracking-widest px-4">
            Alat ini tidak menyimpan file apapun di server kami.
        </p>
    </footer>

    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            menu.classList.toggle('menu-open');
            overlay.classList.toggle('hidden');
        }

        function fp() {
            return btoa(navigator.userAgent + screen.width + Intl.DateTimeFormat().resolvedOptions().timeZone);
        }

        async function process() {
            const urlInput = document.getElementById("url");
            const status = document.getElementById("status");
            const loading = document.getElementById("loading");
            const result = document.getElementById("result");
            const placeholder = document.getElementById("placeholder-info");
            
            const url = urlInput.value;
            if (!url) return alert("Silakan tempel link TikTok terlebih dahulu!");

            const userFP = fp();

            status.innerText = "⏳ Sedang memproses...";
            status.className = "text-center mt-4 text-sm font-semibold text-indigo-600";
            loading.classList.remove("hidden");
            result.classList.add("hidden");
            placeholder.classList.add("hidden");

            try {
                const { data } = await axios.get("/v1/api/convert", {
                    params: { url, fp: userFP },
                    headers: { "X-Fingerprint": userFP }
                });

                loading.classList.add("hidden");

                if (!data.status) {
                    status.innerText = "❌ Gagal: " + (data.message || "Link tidak valid");
                    status.className = "text-center mt-4 text-sm font-semibold text-red-500";
                    placeholder.classList.remove("hidden");
                    return;
                }

                status.innerText = "✅ Video ditemukan!";
                status.className = "text-center mt-4 text-sm font-semibold text-green-600";
                
                document.getElementById("video").src = data.download.nowm;
                document.getElementById("title").innerText = data.title || "TikTok Video";
                document.getElementById("author").innerText = "@" + (data.author || "creator");

                document.getElementById("nowm").onclick = () => download(data.download.nowm, "video-nowm.mp4");
                document.getElementById("wm").onclick = () => download(data.download.wm, "video-wm.mp4");
                document.getElementById("mp3").onclick = () => download(data.download.mp3, "audio.mp3");

                result.classList.remove("hidden");

            } catch (err) {
                loading.classList.add("hidden");
                status.innerText = "❌ Terjadi kesalahan server.";
                status.className = "text-center mt-4 text-sm font-semibold text-red-500";
            }
        }

        function download(url, name){
  const cleanTitle = title.innerText
    .replace(/[^\w\s.-]/g, "")
    .replace(/\s+/g, "_")
    .substring(0, 50);

  status.innerText="⬇️ downloading...";

  window.location.href =
    `/v1/api/download?url=${encodeURIComponent(url)}&filename=${cleanTitle}_${name}&fp=${fp()}`;
}
    </script>
</body>
</html>
