<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Shorts Downloader - No Watermark</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #f8fafc 100%);
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .btn-gradient {
            background: linear-gradient(to right, #6366f1, #a855f7);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #side-menu {
            transition: transform 0.3s ease-in-out;
        }
        .menu-open {
            transform: translateX(0) !important;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4 sm:p-8 relative overflow-x-hidden">

<nav class="w-full max-w-4xl flex justify-end mb-4">
    <button onclick="toggleMenu()" class="p-3 bg-white rounded-xl shadow-sm hover:bg-gray-50 transition-colors z-50">
        <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
        </svg>
    </button>
</nav>

<div id="menu-overlay" onclick="toggleMenu()" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm z-[60]"></div>

<div id="side-menu" class="fixed top-0 right-0 h-full w-64 bg-white shadow-2xl z-[70] translate-x-full p-6 flex flex-col">
    <div class="flex justify-between items-center mb-10">
        <span class="font-bold text-lg text-gray-800">Menu</span>
        <button onclick="toggleMenu()" class="text-gray-400 hover:text-red-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <nav class="flex flex-col gap-4">
        <a href="/" class="flex items-center gap-3 p-3 bg-indigo-50 text-indigo-600 rounded-xl font-semibold">
            🏠 Home
        </a>
        <a href="/api" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-50 rounded-xl">
            🔌 API Documentation
        </a>
    </nav>
</div>

<header class="text-center mb-8">
    <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text">
        YT Shorts Downloader
    </h1>
</header>

<main class="w-full max-w-md space-y-4">
        
<div class="card p-6">
    <input id="url" 
        class="w-full bg-gray-50 border rounded-xl px-4 py-4 mb-4"
        placeholder="Tempel link YouTube Shorts...">

    <button onclick="process()" 
        class="btn-gradient w-full text-white py-4 rounded-xl font-bold">
        🚀 Mulai Download
    </button>

    <div id="status" class="text-center mt-4 text-sm"></div>

    <div id="loading" class="hidden flex justify-center mt-4">
        <div class="loader"></div>
    </div>
</div>

<div id="result" class="hidden card p-5">
    <video id="video" controls class="w-full rounded-xl mb-3"></video>
    <h2 id="title" class="font-bold text-sm mb-3"></h2>

    <button id="nowm" class="w-full py-3 bg-green-500 text-white rounded-lg font-bold text-xs">
        DOWNLOAD
    </button>
</div>

</main>

<script>
function toggleMenu() {
    document.getElementById('side-menu').classList.toggle('menu-open');
    document.getElementById('menu-overlay').classList.toggle('hidden');
}

async function process() {
    const url = document.getElementById("url").value;
    const status = document.getElementById("status");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    if (!url) return alert("Masukkan link!");

    status.innerText = "⏳ Loading...";
    loading.classList.remove("hidden");
    result.classList.add("hidden");

    try {
        const { data } = await axios.get("/api/v2/ytshorts", {
            params: { url }
        });

        loading.classList.add("hidden");

        if (!data.status) {
            status.innerText = "❌ Gagal";
            return;
        }

        const v = data.result;
        const videoUrl = v.audio.url;

        document.getElementById("video").src = videoUrl;
        document.getElementById("title").innerText = v.title;

        document.getElementById("nowm").onclick = () => {
            window.location.href = `/api/v2/download?url=${encodeURIComponent(videoUrl)}&filename=ytshorts.mp4`;
        };

        result.classList.remove("hidden");
        status.innerText = "✅ Siap download";

    } catch {
        loading.classList.add("hidden");
        status.innerText = "❌ Server error";
    }
}
</script>

</body>
</html>
